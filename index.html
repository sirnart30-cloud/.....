<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกมทายสายบุคลิก 🐶</title>
<style>
/* ====== พื้นหลัง 4 พาร์ทเทล + ลายดอกไม้ ====== */
body {
  font-family: 'Comic Sans MS', cursive, sans-serif;
  background: 
    linear-gradient(to bottom right, #ffe6f0 50%, #ffd6e8 50%) top left / 50% 50% no-repeat,
    linear-gradient(to bottom right, #ffd6e8 50%, #ffe6f0 50%) top right / 50% 50% no-repeat,
    linear-gradient(to bottom right, #ffe6f0 50%, #ffd6e8 50%) bottom left / 50% 50% no-repeat,
    linear-gradient(to bottom right, #ffd6e8 50%, #ffe6f0 50%) bottom right / 50% 50% no-repeat,
    url('https://i.imgur.com/9f0F8kD.png');
  background-repeat: repeat;
  background-size: cover;
  padding: 20px;
  text-align:center;
  color: #333;
}
h1 {
  text-align: center;
  color: #fff;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}
/* ====== คำถาม ====== */
.question {
  margin-bottom: 20px;
  background: rgba(255,255,255,0.9);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.question:hover { transform: scale(1.02); }

/* ====== ตัวเลือก 4 พาร์ทเทล ====== */
.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 15px;
}
.answers button {
  padding: 15px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  background: linear-gradient(45deg, #6a11cb, #2575fc);
  color: white;
  transition: all 0.2s;
}
.answers button:hover {
  transform: translateY(-3px);
  background: linear-gradient(45deg, #2575fc, #6a11cb);
}

/* ====== ผลลัพธ์ ====== */
#result {
  margin-top: 30px;
  font-size: 18px;
  font-weight: bold;
  white-space: pre-line;
  background: rgba(255,255,255,0.9);
  padding:20px;
  border-radius:15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
  text-align:left;
}
#resetBtn {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background: #ff6b6b;
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition: all 0.2s;
}
#resetBtn:hover { transform: scale(1.05); background:#ff4c4c; }
</style>
</head>
<body>

<h1>🎉 เกมทายสายบุคลิก 🐶</h1>
<div id="quiz"></div>
<div id="result"></div>
<button id="resetBtn" style="display:none;" onclick="resetQuiz()">เล่นอีกครั้ง 🔄</button>

<script>
// ======= 30 คำถาม =======
const questions = [
{q:"เวลาตื่นเช้า คุณมักจะทำอะไรเป็นอันดับแรก?", a:["A: ลุกไปทำกิจกรรมสนุก ๆ หรือออกกำลังกาย 🏃‍♂️","B: เตรียมตัวและช่วยเหลือคนรอบตัว 🤗","C: นั่งจิบกาแฟ อ่านหนังสือ หรือพักผ่อน ☕","D: วางแผนวันและคิดสิ่งที่ต้องทำ 📝"]},
{q:"คุณจัดการกับความเครียดอย่างไร?", a:["A: ทำกิจกรรมสนุก ๆ หรือเล่นกับเพื่อน 😆","B: พูดคุยกับเพื่อนหรือช่วยเหลือคนอื่น 👫","C: นั่งคิดและรอเวลาให้ใจเย็น 🌿","D: วิเคราะห์ปัญหาและวางแผนแก้ไข 🧠"]},
{q:"คุณชอบสไตล์การเข้าสังคมแบบไหน?", a:["A: ชอบกิจกรรมสนุก ๆ มีเสียงหัวเราะ 🎉","B: อยู่กับเพื่อนสนิท คอยช่วยเหลือ 💕","C: ชอบสังเกตคนอื่นและอยู่แบบสงบ 👀","D: ชอบคุยกับทุกคนและแลกเปลี่ยนไอเดีย 💬"]},
{q:"คุณชอบใช้เวลาว่างแบบไหน?", a:["A: ทำกิจกรรมสนุก ๆ หรือออกกำลังกาย 🏋️","B: ช่วยเพื่อนหรือทำสิ่งดี ๆ ให้คนอื่น 🌸","C: อ่านหนังสือ ฟังเพลง หรือพักผ่อน 📖","D: เรียนรู้สิ่งใหม่ ๆ หรือคิดสร้างสรรค์ 💡"]},
{q:"เมื่อมีปัญหา คุณมักจะทำอย่างไร?", a:["A: ลงมือทำทันที ⚡","B: ช่วยเพื่อนและดูแลคนอื่น 👫","C: นั่งคิดและใจเย็น 🌱","D: วิเคราะห์และวางแผนแก้ไข 📊"]},
{q:"คุณชอบความท้าทายระดับไหน?", a:["A: ชอบความท้าทายสูง 🎢","B: ชอบช่วยเพื่อนฝ่าความท้าทาย 🛡️","C: ชอบความท้าทายปลอดภัย 📌","D: ชอบความท้าทายใช้ความคิด 🧩"]},
{q:"เวลามีคนขอความช่วยเหลือ คุณทำอย่างไร?", a:["A: ช่วยสนุก ๆ 😎","B: ช่วยเต็มที่และจริงใจ 💖","C: ช่วยเลือกวิธีปลอดภัย 🛡️","D: ช่วยด้วยการคิดวิเคราะห์ 📐"]},
{q:"คุณชอบทำงานแบบไหน?", a:["A: งานที่ลงมือทำจริง ⚡","B: งานช่วยเหลือคนอื่น 💕","C: งานสงบ ไม่ซับซ้อน 🌿","D: งานต้องใช้ความคิด 🧠"]},
{q:"เวลามีวันหยุดยาว คุณทำอะไร?", a:["A: ออกไปเที่ยว 🌴","B: ช่วยเพื่อนหรือครอบครัว 🤗","C: พักผ่อน นั่งฟังเพลง 📚","D: วางแผนทำสิ่งใหม่ 💡"]},
{q:"คุณเป็นคนคิดเร็วหรือช้า?", a:["A: คิดเร็ว ⚡","B: คิดเร็วแต่คำนึงถึงคนอื่น 🤝","C: คิดช้า รอบคอบ 🧐","D: คิดช้า วิเคราะห์ทุกขั้นตอน 📊"]},
{q:"เวลามีปาร์ตี้ คุณชอบทำอะไร?", a:["A: ลุยเต้นรำ 🎶","B: ดูแลเพื่อนให้สนุก 💕","C: นั่งคุยแบบสงบ 🌿","D: สังเกตและวางแผนกิจกรรม 📋"]},
{q:"คุณชอบการผจญภัยแบบไหน?", a:["A: ทำอะไรตื่นเต้น 🎢","B: ผจญภัยกับเพื่อน 🤗","C: ผจญภัยเงียบ ๆ 🌳","D: ผจญภัยวางแผน 🗺️"]},
{q:"คุณชอบสัตว์แบบไหน?", a:["A: ร่าเริง ขี้เล่น 🐕","B: อ่อนโยน ใจดี 🐾","C: สงบ นิ่ง 🐱","D: ฉลาด มีเหตุผล 🦉"]},
{q:"เวลาทำอาหาร คุณเป็นแบบไหน?", a:["A: ทำแบบสนุก ๆ 🍳","B: ทำให้คนอื่นมีความสุข 🥗","C: ทำแบบชิลล์ ๆ 🥘","D: ทำแบบคิดสูตรละเอียด 📝"]},
{q:"คุณจัดการเวลาอย่างไร?", a:["A: ทำทันที ไม่รอ ⏱️","B: ทำและช่วยคนอื่น 🕊️","C: ทำแบบสบาย ๆ 🛋️","D: วางแผนทุกขั้นตอน 📅"]},
{q:"คุณชอบดนตรีแบบไหน?", a:["A: จังหวะสนุก ๆ 🎸","B: เพลงอบอุ่น 💖","C: เพลงสงบ 🌙","D: เพลงซับซ้อน 🎼"]},
{q:"คุณเป็นคนขี้สงสัยไหม?", a:["A: สงสัยสนุก ๆ 🤔","B: สงสัยเพื่อช่วยเพื่อน 🕵️","C: สงสัยอย่างเงียบ ๆ 🧐","D: สงสัยวิเคราะห์ทุกอย่าง 🔬"]},
{q:"คุณชอบดูหนังแนวไหน?", a:["A: สนุก ตื่นเต้น 🎬","B: รัก ความสัมพันธ์ 💕","C: เงียบ สงบ 🌌","D: สร้างสรรค์ ซับซ้อน 🧩"]},
{q:"คุณเป็นคนชอบวางแผนไหม?", a:["A: ไม่ค่อยวางแผน ⚡","B: วางแผนให้คนอื่น 😊","C: วางแผนแบบสบาย ๆ 🛋️","D: วางแผนละเอียดทุกขั้นตอน 📝"]},
{q:"คุณจัดการกับความล้มเหลวอย่างไร?", a:["A: ลุยต่อ ⚡","B: ให้กำลังใจคนอื่น 💖","C: รับแบบสงบ 🌿","D: วิเคราะห์และปรับปรุง 🧠"]},
{q:"เวลารู้สึกเบื่อ คุณทำอะไร?", a:["A: หากิจกรรมสนุก ๆ 🎉","B: ช่วยเหลือหรือพูดคุยเพื่อน 🤗","C: นั่งพักเงียบ ๆ 🛋️","D: เริ่มคิดไอเดียใหม่ ๆ 💡"]},
{q:"คุณชอบเรียนรู้แบบไหน?", a:["A: ลงมือทำสนุก ๆ ⚡","B: เรียนรู้กับเพื่อน 👫","C: เรียนรู้เงียบ ๆ 🌿","D: เรียนรู้แบบวิเคราะห์ 🧠"]},
{q:"เวลามีปัญหากับเพื่อน คุณทำอย่างไร?", a:["A: แก้ปัญหาแบบเร็ว ๆ 😎","B: ช่วยและเข้าใจ 💖","C: อยู่สงบ ๆ 🌿","D: คิดและวางแผน 📊"]},
{q:"คุณชอบกีฬาแบบไหน?", a:["A: สนุกและตื่นเต้น 🏀","B: เล่นกับเพื่อน ⚽","C: กีฬาเงียบ ๆ 🧘","D: กีฬาใช้ความคิด ♟️"]},
{q:"เวลามีโอกาสใหม่ คุณทำอย่างไร?", a:["A: ลุยทันที ⚡","B: คำนึงถึงคนอื่น 🤝","C: พิจารณาแบบชิลล์ 🌱","D: วิเคราะห์ทุกด้าน 🧐"]},
{q:"คุณชอบอ่านหนังสือแนวไหน?", a:["A: สนุก ตื่นเต้น 📚","B: ให้กำลังใจ 💕","C: สงบ ผ่อนคลาย 🌿","D: วิเคราะห์ ซับซ้อน 🧠"]},
{q:"คุณเป็นคนคิดสร้างสรรค์ไหม?", a:["A: สร้างสรรค์แบบสนุก 🎨","B: สร้างสรรค์เพื่อช่วยเพื่อน 💖","C: สร้างสรรค์แบบสงบ 🌳","D: สร้างสรรค์แบบวิเคราะห์ 🧩"]},
{q:"เวลามีคนใหม่เข้ามา คุณทำอย่างไร?", a:["A: เข้าไปสนุกด้วย 😆","B: ช่วยให้เขารู้สึกอบอุ่น 💕","C: สังเกตแบบสงบ 👀","D: พูดคุยแลกเปลี่ยนความคิด 💬"]}
];

// ======= 10 สายบทสรุป =======
const descriptions = {
"หมาซน": "คุณเป็นหมาซน 🐶💥 ร่าเริง ขี้เล่น มีพลังงานสูง ชอบลองสิ่งใหม่ ๆ และผจญภัยกับเพื่อนอยู่เสมอ\n\nคำแนะนำ: สนุกได้ แต่ควรวางแผนเล็กน้อยเพื่อความปลอดภัย",
"หมาใจดี": "คุณเป็นหมาใจดี 🐶💖 รอบคอบ อ่อนโยน ชอบช่วยเหลือคนอื่น\n\nคำแนะนำ: บางครั้งควรปล่อยตัวเองสนุกบ้างเพื่อชีวิตสดใส",
"หมาเด็กขี้เล่น": "คุณเป็นหมาเด็กขี้เล่น 🐶🎉 ร่าเริง เข้าได้กับทุกคน ชอบหัวเราะและทำให้คนรอบตัวสนุก\n\nคำแนะนำ: ระวังซนเกินไปจะทำให้เหนื่อยหรือสร้างปัญหา",
"หมาชิลล์": "คุณเป็นหมาชิลล์ 🐶😎 สุขุม ลึกลับ ชอบความสงบและมีความเป็นตัวเอง\n\nคำแนะนำ: ลองเปิดใจสนุกกับกิจกรรมใหม่ ๆ บ้าง",
"หมาหัวไว": "คุณเป็นหมาหัวไว 🐶🧠 ฉลาด เรียนรู้เร็ว วิเคราะห์ได้ดี\n\nคำแนะนำ: ลองทำกิจกรรมสนุก ๆ เพื่อผ่อนคลายสมองบ้าง",
"หมาอันตรายแอบซ่อนความร้าย": "คุณเป็นหมาอันตรายแอบซ่อนความร้าย 🐶🔥 ขี้เล่นแบบแสบ ๆ มีความคิดสร้างสรรค์ แต่ซ่อนความแสบไว้\n\nคำแนะนำ: สนุกได้แต่ระวังไม่ให้คนอื่นเดือดร้อน",
"หมาเซอร์ไพรส์": "คุณเป็นหมาเซอร์ไพรส์ 🐶🎁 ทำอะไรไม่คาดคิด ชอบสร้างความสนุกแบบแปลกใหม่\n\nคำแนะนำ: จัดลำดับความสำคัญของเรื่องสำคัญด้วย",
"หมาใจนักสู้": "คุณเป็นหมาใจนักสู้ 🐶💪 กล้าแสดงออก มีความมุ่งมั่น และไม่ยอมแพ้ต่ออุปสรรค\n\nคำแนะนำ: เรียนรู้ที่จะผ่อนคลายบ้าง จะทำให้สนุกขึ้น",
"หมาเจ้าพ่อเกม": "คุณเป็นหมาเจ้าพ่อเกม 🐶🎮 ชอบแข่งขันและความท้าทาย\n\nคำแนะนำ: จัดเวลาเล่นเกมและพักผ่อนให้สมดุล",
"หมาสายแฟนตาซี": "คุณเป็นหมาสายแฟนตาซี 🐶✨ จินตนาการสูง ชอบความสร้างสรรค์\n\nคำแนะนำ: ลองเชื่อมต่อกับคนอื่นเพื่อแชร์ไอเดียและความสนุก"
};

// ======= เก็บคะแนน =======
let answersCount = {a:0,b:0,c:0,d:0};
let currentQuestion = 0;

// ======= แสดงคำถาม =======
function showQuestion(){
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";

  if(currentQuestion >= questions.length){ showResult(); return; }

  const q = questions[currentQuestion];
  const qDiv = document.createElement("div");
  qDiv.className="question";
  qDiv.innerHTML=`<p>${currentQuestion+1}. ${q.q}</p>`;

  const ansDiv = document.createElement("div"); ansDiv.className="answers";
  ["a","b","c","d"].forEach((ans,i)=>{
    const btn = document.createElement("button");
    btn.textContent = q.a[i];
    btn.onclick = ()=>{
      answersCount[ans]++; currentQuestion++; showQuestion();
    };
    ansDiv.appendChild(btn);
  });
  qDiv.appendChild(ansDiv);
  quizDiv.appendChild(qDiv);
}

// ======= แสดงผลลัพธ์ =======
function showResult(){
  let scoreMap = { "หมาซน": answersCount["a"], "หมาใจดี": answersCount["b"], "หมาชิลล์": answersCount["c"], "หมาหัวไว": answersCount["d"] };
  let weightedArray = [];
  for(let key in scoreMap){ for(let i=0;i<scoreMap[key];i++){ weightedArray.push(key); } }
  if(weightedArray.length === 0){ weightedArray = ["หมาซน","หมาใจดี","หมาชิลล์","หมาหัวไว"]; }
  const finalType = weightedArray[Math.floor(Math.random()*weightedArray.length)];
  const desc = descriptions[finalType];

  document.getElementById("quiz").style.display="none";
  document.getElementById("result").innerText = desc;
  document.getElementById("resetBtn").style.display="inline-block";
}

// ======= เล่นอีกครั้ง =======
function resetQuiz(){
  answersCount = {a:0,b:0,c:0,d:0};
  currentQuestion = 0;
  document.getElementById("quiz").style.display="block";
  document.getElementById("result").innerText="";
  document.getElementById("resetBtn").style.display="none";
  showQuestion();
}

// ======= เริ่มเกม =======
showQuestion();
</script>
</body>
</html>
